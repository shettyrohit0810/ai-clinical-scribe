# nginx site config for AI Clinical Scribe.
# Install to /etc/nginx/sites-available/ai-scribe and symlink into
# sites-enabled (see infra/DEPLOY.md step 10). Certbot rewrites this file to
# add the TLS server block + port-80 redirect — run it AFTER installing this.
#
# Replace scribe.example.com with your real hostname before installing.

server {
    server_name scribe.example.com;
    listen 80;

    # ---- SPA ---------------------------------------------------------------
    # Static build output (rsync'd / built on the box). The try_files fallback
    # to index.html makes client-side routes deep-linkable; it can never
    # shadow the API because every backend route lives under /api.
    root /srv/ai-scribe/frontend/dist;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # ---- API (incl. SSE) ---------------------------------------------------
    # One location for all backend traffic. The three settings below are what
    # make streaming work — without them nginx buffers the whole SSE response
    # and the UI gets a spinner-then-dump instead of progressive tokens:
    #   proxy_buffering off   — forward bytes to the client as they arrive
    #   proxy_cache off       — never serve a stream from cache
    #   proxy_read_timeout    — a slow LLM generation can hold the connection
    #                           open for minutes; default 60s would cut it off
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # ---- WebSocket (voice edit session, Phase 8) ---------------------------
    # The Upgrade/Connection pair is what turns a proxied HTTP request into a
    # WebSocket tunnel; without it the handshake 400s at nginx.
    location /ws/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }
}
